function calcSum(tekrar) {
  if (!tekrar) return "";
  const nums = tekrar.replace(/[^0-9+.,]/g, "").split("+").map(s => parseFloat(s.replace(",","."))).filter(n => !isNaN(n));
  if (nums.length === 0) return "";
  const total = nums.reduce((a, b) => a + b, 0);
  return Number.isInteger(total) ? String(total) : total.toFixed(2);
}

function genId() { return "m_" + Date.now() + "_" + Math.random().toString(36).substr(2,5); }

function loadLogs() {
  try { const s = localStorage.getItem("idman_v4"); if (s) return JSON.parse(s); } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_LOGS));
}
function saveLogs(logs) {
  try { localStorage.setItem("idman_v4", JSON.stringify(logs)); } catch(e) {}
}

    textDone: D ? "#7dff7d" : "#1b5e20",
    textRest: D ? "#9966cc" : "#4a0080",
    inputBg: D ? "#2a2a4a" : "#ffffff",
    inputBorder: D ? "#444" : "#999999",
    gold: D ? "#FFD700" : "#7a5800",
    statBg: D ? "#1a1a30" : "#eeeeee",
    statBorder: D ? "#333" : "#999999",
    ayActive: D ? "#FFD700" : "#1565c0",
    ayActiveTxt: D ? "#0d0d1a" : "#ffffff",
    ayBg: D ? "#1a1a30" : "#e0e0e0",
    ayTxt: D ? "#888" : "#111111",
    ayBorder: D ? "#333" : "#999999",
  };

  const getLog = (tarix) => logs[tarix] || { done: false, muddet: 20, mesqler: [] };
  const updateLog = (tarix, newLog) => setLogs(prev => ({ ...prev, [tarix]: JSON.parse(JSON.stringify(newLog)) }));

  const handleSave = () => {
    saveLogs(logs);
    setSaveStatus("saved");
    setTimeout(() => setSaveStatus("idle"), 2000);
  };

  const handleExport = () => {
    const idmanDays = GUNLER.filter(g => g.nov === "idman" && getLog(g.tarix).done);
    const istirahDays = GUNLER.filter(g => g.nov === "istirahət" && getLog(g.tarix).gunluk);
    let text = "📊 İDMAN HESABATI\n" + "=".repeat(30) + "\n";
    idmanDays.forEach(g => {
      const log = getLog(g.tarix);
      text += `\n📅 ${g.tarix} — ${g.gun} (${log.muddet || 0} dəq)\n`;
      (log.mesqler || []).forEach(m => {
        const ad = m.nov === "Digər" ? (m.novAd || "Digər") : m.nov;
        text += `  • ${ad}: ${m.tekrar || ""} → ${m.cemi || ""} ${m.qeyd ? "(" + m.qeyd + ")" : ""}\n`;
      });
      if (log.enerji || log.ruhhal || log.agri || log.deyer) {
        text += `  📊 Dəyərləndirmə:\n`;
        if (log.enerji) text += `     ⚡ Enerji: ${"⚡".repeat(log.enerji)} (${log.enerji}/5)\n`;
        if (log.ruhhal) text += `     😊 Ruh halı: ${log.ruhhal}\n`;
        if (log.agri) text += `     💪 Ağrı: ${log.agri}\n`;
        if (log.deyer) text += `     📝 Qeyd: ${log.deyer}\n`;
      }
    });
    text += "\n" + "=".repeat(30) + `\nCəmi: ${idmanDays.length} idman günü`;
    navigator.clipboard.writeText(text).then(() => {
      setCopyStatus("copied");
      setTimeout(() => setCopyStatus("idle"), 2500);
    }).catch(() => alert(text));
  };

  const addMesq = (tarix) => {
    const log = getLog(tarix);
    updateLog(tarix, { ...log, mesqler: [...(log.mesqler || []), { id: genId(), nov: "Şınav", tekrar: "", cemi: "", qeyd: "", novAd: "" }] });
  };
  const removeMesq = (tarix, id) => {
    const log = getLog(tarix);
    updateLog(tarix, { ...log, mesqler: log.mesqler.filter(m => m.id !== id) });
  };
  const updateMesq = (tarix, id, field, val) => {
    const log = getLog(tarix);
    const updated = log.mesqler.map(m => {
      if (m.id !== id) return m;
      const newM = { ...m, [field]: val };
      if (field === "tekrar") newM.cemi = calcSum(val);
      return newM;
    });
    updateLog(tarix, { ...log, mesqler: updated });
  };

  const aylar = ["Mart", "Aprel", "May", "İyun", "İyul", "Avqust"];
  const filteredGunler = GUNLER.filter(g => g.ay === activeAy);
  const totalDone = GUNLER.filter(g => g.nov === "idman" && getLog(g.tarix).done).length;
  const selGun = selTarix ? GUNLER.find(g => g.tarix === selTarix) : null;
  const selLog = selTarix ? getLog(selTarix) : null;

  const inp = (val, onChange, placeholder, extra={}) => (
    <input value={val} onChange={e => onChange(e.target.value)}
      onFocus={e => e.target.select()}
      placeholder={placeholder}
      style={{ background: colors.inputBg, border: `1px solid ${colors.inputBorder}`,
        color: colors.text, borderRadius: 6, padding: "5px 8px", fontSize: 12, ...extra }} />
  );

  return (
    <div style={{ fontFamily: "Arial, sans-serif", color: colors.text, background: colors.bg, minHeight: "100vh", padding: 14 }}>

      <div style={{ textAlign: "center", marginBottom: 14 }}>
        <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: 10 }}>
          <div style={{ fontSize: 20, fontWeight: "bold", color: colors.gold }}>💪 İDMAN PROQRAMI</div>
          <button onClick={() => setDarkMode(!darkMode)}
            style={{ background: colors.statBg, border: `1px solid ${colors.statBorder}`, borderRadius: 20,
              padding: "4px 10px", cursor: "pointer", fontSize: 14, color: colors.text }}>
            {darkMode ? "☀️" : "🌙"}
          </button>
        </div>
        <div style={{ color: colors.textMuted, fontSize: 11, marginTop: 3 }}>Mart–Avqust 2026</div>
      </div>

      <div style={{ display: "flex", gap: 8, marginBottom: 14, justifyContent: "center", flexWrap: "wrap" }}>
        {[
          { label: "Ümumi idman", val: totalDone, icon: "✅" },
          { label: "May-Avq planı", val: "Ç.ax·C.ax·Şnb", icon: "📅" },
          { label: "Hər gün", val: "15-30 dəq", icon: "⏱️" },
        ].map((s, i) => (
          <div key={i} style={{ background: colors.statBg, border: `1px solid ${colors.statBorder}`, borderRadius: 10, padding: "7px 14px", textAlign: "center", minWidth: 90 }}>
            <div style={{ fontSize: 16 }}>{s.icon}</div>
            <div style={{ color: colors.gold, fontWeight: "bold", fontSize: 15 }}>{s.val}</div>
            <div style={{ color: colors.textMuted, fontSize: 10 }}>{s.label}</div>
          </div>
        ))}
      </div>

      <div style={{ display: "flex", gap: 6, marginBottom: 14, justifyContent: "center", flexWrap: "wrap" }}>
        {aylar.map(ay => (
          <button key={ay} onClick={() => { setActiveAy(ay); setSelTarix(null); }}
            style={{ padding: "7px 14px", borderRadius: 20, cursor: "pointer", fontSize: 12, fontWeight: "bold",
              background: activeAy === ay ? colors.ayActive : colors.ayBg,
              color: activeAy === ay ? colors.ayActiveTxt : colors.ayTxt,
              border: activeAy === ay ? "none" : `1px solid ${colors.ayBorder}` }}>{ay}</button>
        ))}
      </div>

      {selTarix && selGun && (
        <div style={{ background: colors.card, border: `1px solid ${colors.gold}`, borderRadius: 12, padding: 14, marginBottom: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div>
              <div style={{ color: colors.gold, fontWeight: "bold", fontSize: 15 }}>{selTarix}</div>
              <div style={{ color: colors.textMuted, fontSize: 12 }}>{selGun.gun}</div>
            </div>
            <button onClick={() => setSelTarix(null)} style={{ background: "none", border: "none", color: colors.textMuted, fontSize: 22, cursor: "pointer" }}>✕</button>
          </div>

          {selGun.nov === "istirahət" ? (
            <div>
              <div style={{ textAlign: "center", padding: "12px 0 16px", color: colors.textRest, fontSize: 16 }}>😴 İstirahət günü — bərpa zamanı!</div>
              <div style={{ background: D ? "#0d1a2a" : "#e8eaf6", borderRadius: 10, padding: 12, border: `1px solid ${D ? "#1a3a5a" : "#7986cb"}` }}>
                <div style={{ color: D ? "#5B9BD5" : "#0d47a1", fontWeight: "bold", fontSize: 13, marginBottom: 8 }}>📖 Günlük</div>
                <div style={{ color: colors.textMuted, fontSize: 11, marginBottom: 8 }}>Bu gün necə keçdi? Nə düşündün? Nə hiss etdin?</div>
                <textarea
                  value={selLog.gunluk || ""}
                  onChange={e => updateLog(selTarix, { ...selLog, gunluk: e.target.value })}
                  placeholder="Bu günün qeydi..."
                  rows={5}
                  style={{ width: "100%", background: colors.inputBg, border: `1px solid ${colors.inputBorder}`,
                    color: colors.text, borderRadius: 8, padding: "10px", fontSize: 13, resize: "none", outline: "none",
                    fontFamily: "Arial, sans-serif", lineHeight: 1.6 }} />
              </div>
            </div>
          ) : (
            <>
              <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 12, flexWrap: "wrap" }}>
                <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
                  <input type="checkbox" checked={selLog.done || false}
                    onChange={e => updateLog(selTarix, { ...selLog, done: e.target.checked })}
                    style={{ width: 18, height: 18, cursor: "pointer" }} />
                  <span style={{ color: selLog.done ? colors.textDone : colors.textMuted, fontSize: 13, fontWeight: "bold" }}>
                    {selLog.done ? "✅ Tamamlandı" : "⬜ Tamamlanmadı"}
                  </span>
                </label>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginLeft: "auto" }}>
                  <span style={{ color: colors.textMuted, fontSize: 12 }}>⏱️</span>
                  <input type="number" min="0" max="120"
                    value={selLog.muddet === 0 ? "" : selLog.muddet}
                    placeholder="0"
                    onFocus={e => e.target.select()}
                    onChange={e => updateLog(selTarix, { ...selLog, muddet: e.target.value === "" ? 0 : Number(e.target.value) })}
                    style={{ width: 55, background: colors.inputBg, border: `1px solid ${colors.inputBorder}`,
                      color: colors.gold, borderRadius: 6, padding: "4px 8px", fontSize: 13, textAlign: "center" }} />
                  <span style={{ color: colors.textMuted, fontSize: 12 }}>dəq</span>
                </div>
              </div>

              {(selLog.mesqler || []).map((m) => (
                <div key={m.id} style={{ background: colors.card2, borderRadius: 8, padding: 10, marginBottom: 8, border: `1px solid ${colors.inputBorder}` }}>
                  <div style={{ display: "flex", gap: 6, marginBottom: 6, flexWrap: "wrap" }}>
                    <select value={m.nov} onChange={e => updateMesq(selTarix, m.id, "nov", e.target.value)}
                      style={{ flex: "1 1 140px", background: colors.inputBg, border: `1px solid ${colors.inputBorder}`,
                        color: D ? colors.gold : "#111111", borderRadius: 6, padding: "5px 8px", fontSize: 12 }}>
                      {MESQLER.map(x => <option key={x} value={x}>{x}</option>)}
                    </select>
                    {m.nov === "Digər" && inp(m.novAd || "", v => updateMesq(selTarix, m.id, "novAd", v), "Məşq adı...", { flex: "1 1 120px" })}
                    <button onClick={() => removeMesq(selTarix, m.id)}
                      style={{ background: "#3a1a1a", border: "1px solid #6a2a2a", color: "#ff6666", borderRadius: 6, padding: "5px 10px", cursor: "pointer", fontSize: 12 }}>✕</button>
                  </div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
                    {inp(m.tekrar, v => updateMesq(selTarix, m.id, "tekrar", v), "Təkrar (10+5+10)", { flex: "1 1 110px" })}
                    <div style={{ display: "flex", alignItems: "center", gap: 4, flex: "1 1 110px" }}>
                      <span style={{ color: colors.textMuted, fontSize: 11 }}>= </span>
                      {inp(m.cemi, v => updateMesq(selTarix, m.id, "cemi", v), "Cəmi", { flex: 1 })}
                    </div>
                    {inp(m.qeyd, v => updateMesq(selTarix, m.id, "qeyd", v), "Qeyd...", { flex: "1 1 110px" })}
                  </div>
                </div>
              ))}
              <button onClick={() => addMesq(selTarix)}
                style={{ width: "100%", background: D ? "#1a2a1a" : "#e8f5e9", border: "1px dashed #4CAF50",
                  color: "#4CAF50", borderRadius: 8, padding: "8px", fontSize: 13, cursor: "pointer" }}>
                + Məşq əlavə et
              </button>

              {/* Dəyərləndirmə */}
              <div style={{ marginTop: 14, background: D ? "#0d1a2a" : "#e8eaf6", borderRadius: 10, padding: 12, border: `1px solid ${D ? "#1a3a5a" : "#7986cb"}` }}>
                <div style={{ color: D ? "#5B9BD5" : "#0d47a1", fontWeight: "bold", fontSize: 13, marginBottom: 10 }}>📊 İdman Sonrası Dəyərləndirmə</div>
                
                {/* Enerji */}
                <div style={{ marginBottom: 10 }}>
                  <div style={{ color: colors.textMuted, fontSize: 11, marginBottom: 5 }}>⚡ Enerji səviyyəsi:</div>
                  <div style={{ display: "flex", gap: 6 }}>
                    {[["1","😩"],["2","😕"],["3","😐"],["4","😊"],["5","🔥"]].map(([n, emoji]) => (
                      <button key={n} onClick={() => updateLog(selTarix, { ...selLog, enerji: Number(n) })}
                        style={{ flex: 1, height: 44, borderRadius: 8, border: "none", cursor: "pointer", fontSize: 13,
                          fontWeight: "bold",
                          background: selLog.enerji === Number(n) ? "#FFD700" : (D ? "#1a1a35" : "#d0d0e8"),
                          color: selLog.enerji === Number(n) ? "#000" : (D ? "#aaa" : "#333") }}>
                        {emoji}<br/><span style={{fontSize:10}}>{n}/5</span>
                      </button>
                    ))}
                  </div>
                </div>

                {/* Ruh halı */}
                <div style={{ marginBottom: 10 }}>
                  <div style={{ color: colors.textMuted, fontSize: 11, marginBottom: 5 }}>😊 Ruh halı:</div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {[["😴","Yorğun"],["😐","Orta"],["🙂","Yaxşı"],["😄","Əla"],["🔥","Möhtəşəm"]].map(([emoji, label]) => (
                      <button key={label} onClick={() => updateLog(selTarix, { ...selLog, ruhhal: label })}
                        style={{ padding: "5px 10px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 12,
                          background: selLog.ruhhal === label ? "#5B9BD5" : (D ? "#1a1a35" : "#d0d0e8"),
                          color: selLog.ruhhal === label ? "#fff" : (D ? colors.textMuted : "#222222") }}>
                        {emoji} {label}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Ağrı */}
                <div style={{ marginBottom: 10 }}>
                  <div style={{ color: colors.textMuted, fontSize: 11, marginBottom: 5 }}>💪 Əzələ ağrısı:</div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {[["✅","Yoxdur"],["⚠️","Az"],["🔴","Çox"]].map(([emoji, label]) => (
                      <button key={label} onClick={() => updateLog(selTarix, { ...selLog, agri: label })}
                        style={{ padding: "5px 10px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 12,
                          background: selLog.agri === label ? "#5B9BD5" : (D ? "#1a1a35" : "#d0d0e8"),
                          color: selLog.agri === label ? "#fff" : (D ? colors.textMuted : "#222222") }}>
                        {emoji} {label}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Sərbəst qeyd */}
                <div>
                  <div style={{ color: colors.textMuted, fontSize: 11, marginBottom: 5 }}>📝 Sərbəst qeyd:</div>
                  <textarea
                    value={selLog.deyer || ""}
                    onChange={e => updateLog(selTarix, { ...selLog, deyer: e.target.value })}
                    placeholder="O gün necə hiss etdin? Nə çətin gəldi? Nə yaxşı getdi?..."
                    rows={3}
                    style={{ width: "100%", background: colors.inputBg, border: `1px solid ${colors.inputBorder}`,
                      color: colors.text, borderRadius: 8, padding: "8px", fontSize: 12, resize: "none", outline: "none",
                      fontFamily: "Arial, sans-serif" }} />
                </div>
              </div>
            </>
          )}
        </div>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {filteredGunler.map((g) => {
          const log = getLog(g.tarix);
          const isRest = g.nov === "istirahət";
          const isDone = log.done;
          const isSel = selTarix === g.tarix;
          return (
            <div key={g.tarix} onClick={() => setSelTarix(isSel ? null : g.tarix)}
              style={{
                background: isSel ? (D ? "#1e1e40" : "#e8e8ff") : isDone ? colors.rowDone : isRest ? colors.rowRest : colors.row1,
                border: `1px solid ${isSel ? colors.gold : isDone ? colors.rowBorderDone : isRest ? colors.rowBorderRest : colors.rowBorder}`,
                borderRadius: 8, padding: "8px 12px", cursor: "pointer", display: "flex", alignItems: "center", gap: 10
              }}>
              <div style={{ fontSize: 18, minWidth: 24, textAlign: "center" }}>
                {isRest ? "😴" : isDone ? "✅" : "⬜"}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                  <span style={{ color: colors.textMuted, fontSize: 11 }}>{g.tarix}</span>
                  <span style={{ color: isRest ? colors.textRest : isDone ? colors.textDone : colors.text, fontSize: 13, fontWeight: "bold" }}>{g.gun}</span>
                  {isRest && <span style={{ color: colors.textRest, fontSize: 10 }}>😴 istirahət</span>}
                </div>
                {!isRest && (log.mesqler || []).length > 0 && (
                  <div style={{ color: colors.textMuted, fontSize: 11, marginTop: 2 }}>
                    {(log.mesqler || []).map(m => m.nov === "Digər" ? (m.novAd || "Digər") : m.nov).join(" · ")}
                    {log.muddet ? ` · ${log.muddet} dəq` : ""}
                  </div>
                )}
              </div>
              <div style={{ color: colors.textMuted, fontSize: 16 }}>›</div>
            </div>
          );
        })}
      </div>

      <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 20, paddingBottom: 20, flexWrap: "wrap" }}>
        <button onClick={handleSave}
          style={{ padding: "12px 30px", fontSize: 14, fontWeight: "bold", borderRadius: 10, border: "none", cursor: "pointer",
            background: saveStatus === "saved" ? "#4CAF50" : colors.gold,
            color: saveStatus === "saved" ? "#fff" : "#0d0d1a" }}>
          {saveStatus === "saved" ? "✅ Saxlanıldı!" : "💾 Saxla"}
        </button>
        <button onClick={handleExport}
          style={{ padding: "12px 30px", fontSize: 14, fontWeight: "bold", borderRadius: 10, cursor: "pointer",
            background: copyStatus === "copied" ? "#5B9BD5" : colors.statBg,
            color: copyStatus === "copied" ? "#fff" : "#5B9BD5",
            border: "1px solid #5B9BD5" }}>
          {copyStatus === "copied" ? "✅ Kopyalandı!" : "📋 Kloda paylaş"}
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
